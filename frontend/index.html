<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <!-- Tailwind CSS（class 策略与 html.dark 一致，否则深色按钮切换无效） -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/style.css">
    <style>
        body {
            background:
                radial-gradient(900px 500px at 20% 15%, rgba(99, 102, 241, 0.18), transparent 55%),
                radial-gradient(900px 500px at 80% 5%, rgba(168, 85, 247, 0.14), transparent 55%),
                #ffffff;
            color: #0f172a;
            transition: background-color 0.3s, color 0.3s;
        }

        .dark body {
            background:
                radial-gradient(900px 500px at 20% 15%, rgba(99, 102, 241, 0.20), transparent 55%),
                radial-gradient(900px 500px at 80% 5%, rgba(168, 85, 247, 0.16), transparent 55%),
                #0b1220;
            color: #e5e7eb;
        }

        /* 深色模式切换按钮 */
        .dark-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(2, 6, 23, 0.10);
            transition: all 0.3s ease;
        }

        .dark-mode-toggle:hover {
            transform: scale(1.1);
        }

        .dark .dark-mode-toggle {
            background: rgba(17, 24, 39, 0.6);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        /* 导航栏样式 */
        .navbar {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.35);
        }

        .dark .navbar {
            background: rgba(2, 6, 23, 0.55);
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
        }

        .brand-mark {
            font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
            letter-spacing: 0.06em;
            font-weight: 800;
            text-transform: none;
        }

        .brand-mark-text {
            background: linear-gradient(135deg, #4f46e5 0%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 10px 30px rgba(79, 70, 229, 0.25);
        }

        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(148, 163, 184, 0.35);
            backdrop-filter: blur(10px);
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.18);
        }

        /* 文章卡片动画 */
        .article-card {
            transition: all 0.3s ease;
        }

        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* 技能标签动画 */
        .skill-tag {
            display: inline-block;
            padding: 0.5rem 1rem;
            margin: 0.25rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- 深色模式切换按钮 -->
    <button class="dark-mode-toggle" onclick="toggleDarkMode()">
        <i class="fas fa-moon" id="theme-icon"></i>
    </button>

    <!-- 导航栏 -->
    <nav class="navbar fixed top-0 w-full z-50">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="text-2xl font-bold text-indigo-600">
                    <a href="index.html" class="brand-mark hover:opacity-90 transition-opacity">
                        <span class="brand-mark-text">My Blog</span>
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="nav-link text-slate-700 dark:text-slate-200 hover:text-indigo-600 transition-colors">首页</a>
                    <a href="blog.html" class="nav-link text-slate-700 dark:text-slate-200 hover:text-indigo-600 transition-colors">博客</a>
                    <a href="about.html" class="nav-link text-slate-700 dark:text-slate-200 hover:text-indigo-600 transition-colors">关于我</a>
                </div>
                <div class="hidden md:flex items-center gap-4 text-slate-600 dark:text-slate-200">
                    <a id="contact-gitee" href="#" target="_blank" class="hover:text-indigo-600 transition-colors" aria-label="Gitee">
                        <i class="fas fa-code-branch text-lg"></i>
                    </a>
                    <button type="button" onclick="openEmailModal()" class="hover:text-indigo-600 transition-colors" aria-label="Email">
                        <i class="fas fa-envelope text-lg"></i>
                    </button>
                    <button type="button" onclick="openQQModal()" class="hover:text-indigo-600 transition-colors" aria-label="QQ">
                        <i class="fab fa-qq text-lg"></i>
                    </button>
                    <a href="about.html" class="ml-1 guest-only" data-auth-trigger="1" aria-label="关于博主 / 登录">
                        <img class="author-avatar-thumb hidden" alt="博主头像" />
                        <span class="guest-avatar-btn"><i class="fas fa-user"></i></span>
                    </a>
                    <a href="about.html" class="ml-1 admin-only hidden" aria-label="Avatar">
                        <img class="author-avatar-thumb hidden" alt="头像缩略图" />
                    </a>
                </div>
                <!-- 移动端菜单按钮 -->
                <button class="md:hidden" onclick="toggleMobileMenu()">
                    <i class="fas fa-bars text-2xl"></i>
                </button>
            </div>
            <!-- 移动端菜单 -->
            <div id="mobile-menu" class="hidden md:hidden mt-4 space-y-2">
                <a href="index.html" class="block py-2 text-slate-700 dark:text-slate-200 hover:text-indigo-600">首页</a>
                <a href="blog.html" class="block py-2 text-slate-700 dark:text-slate-200 hover:text-indigo-600">博客</a>
                <a href="about.html" class="block py-2 text-slate-700 dark:text-slate-200 hover:text-indigo-600">关于我</a>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="pt-24">
        <!-- Hero（更接近 OpenRouter：留白 + 居中 + 渐变点缀，不用整条色带） -->
        <section class="px-6">
            <div class="max-w-6xl mx-auto">
                <div class="glass-card rounded-2xl px-6 py-10 md:px-10 md:py-14">
                    <div class="flex flex-col items-center text-center">
                        <h1 class="mt-6 text-4xl md:text-6xl font-bold tracking-tight">
                            <span class="bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">Hi~ Here's zimu's blog</span>
                        </h1>
                        <p class="mt-4 text-base md:text-xl text-slate-600 dark:text-slate-300 max-w-2xl">
                            Ai学习(Coding~)
                        </p>

                        <div class="mt-8 flex flex-col sm:flex-row gap-3">
                            <a href="blog.html" class="inline-flex items-center justify-center rounded-lg bg-indigo-600 text-white px-6 py-3 font-semibold hover:bg-indigo-700 transition-colors">
                                浏览文章 <i class="fas fa-arrow-right ml-2"></i>
                            </a>
                            <a href="about.html" class="inline-flex items-center justify-center rounded-lg border border-slate-300/70 dark:border-slate-600/60 bg-white/40 dark:bg-slate-900/30 text-slate-800 dark:text-slate-100 px-6 py-3 font-semibold hover:bg-white/60 dark:hover:bg-slate-900/45 transition-colors">
                                关于我
                            </a>
                        </div>

                        <div class="mt-8 flex items-center gap-6 text-2xl text-slate-500 dark:text-slate-300">
                            <a id="hero-gitee" href="#" target="_blank" class="hover:text-indigo-600 transition-colors" aria-label="Gitee">
                                <i class="fas fa-code-branch"></i>
                            </a>
                            <button type="button" onclick="openEmailModal()" class="hover:text-indigo-600 transition-colors" aria-label="Email">
                                <i class="fas fa-envelope"></i>
                            </button>
                            <button type="button" onclick="openQQModal()" class="hover:text-indigo-600 transition-colors" aria-label="QQ">
                                <i class="fab fa-qq"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 技能展示 -->
        <section class="mt-10 px-6">
            <div class="max-w-6xl mx-auto">
                <div class="flex items-end justify-between gap-6">
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold">技能专长</h2>
                        <p class="mt-2 text-slate-600 dark:text-slate-300">我常用的技术栈与工具。</p>
                    </div>
                    <a href="about.html" class="hidden sm:inline-flex items-center gap-2 text-indigo-600 hover:text-indigo-700 font-semibold">
                        了解更多 <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
                <div class="flex flex-wrap justify-center" id="skills-container">
                    <!-- 技能标签将通过JavaScript动态加载 -->
                </div>
                <p id="skills-error" class="hidden text-center text-gray-600 dark:text-gray-400 w-full">无法加载技能数据，请确认已在 backend 目录运行 <code class="text-sm bg-gray-200 dark:bg-gray-700 px-1 rounded">python app.py</code></p>
            </div>
        </section>

        <!-- 最新文章 -->
        <section class="mt-12 px-6 pb-16">
            <div class="max-w-6xl mx-auto">
                <div class="flex items-end justify-between gap-6">
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold">最新文章</h2>
                        <p class="mt-2 text-slate-600 dark:text-slate-300">最近更新的内容。</p>
                    </div>
                    <a href="blog.html" class="hidden sm:inline-flex items-center gap-2 text-indigo-600 hover:text-indigo-700 font-semibold">
                        查看全部 <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="articles-container">
                    <!-- 文章卡片将通过JavaScript动态加载 -->
                </div>
                <p id="articles-error" class="hidden text-center text-gray-600 dark:text-gray-400 col-span-full">无法加载文章列表，请确认后端服务已启动。</p>
                <div class="text-center mt-12">
                    <a href="blog.html" class="inline-flex items-center justify-center bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition-colors font-semibold">
                        查看所有文章
                    </a>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="bg-gray-900 text-white py-8 px-6">
        <div class="container mx-auto text-center">
            <p>&copy; 2026 zimu的个人博客. All rights reserved.</p>
        </div>
    </footer>

    <!-- 联系方式弹窗：邮箱 -->
    <div id="email-modal" class="hidden fixed inset-0 z-[1100]">
        <div class="absolute inset-0 bg-black/50" onclick="closeEmailModal()"></div>
        <div class="relative max-w-md mx-auto mt-32 glass-card rounded-2xl p-6">
            <div class="flex items-center justify-between">
                <h3 class="text-lg font-bold text-slate-900 dark:text-white">邮箱</h3>
                <button type="button" class="text-slate-500 hover:text-slate-700 dark:hover:text-slate-200" onclick="closeEmailModal()" aria-label="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <p class="mt-4 text-slate-600 dark:text-slate-300">email：</p>
            <div class="mt-3 rounded-lg border border-slate-200/70 dark:border-slate-600/50 bg-white/50 dark:bg-slate-900/30 px-4 py-3 font-mono text-sm text-slate-900 dark:text-white">
                <span id="email-text">加载中...</span>
            </div>
        </div>
    </div>

    <!-- 联系方式弹窗：QQ -->
    <div id="qq-modal" class="hidden fixed inset-0 z-[1100]">
        <div class="absolute inset-0 bg-black/50" onclick="closeQQModal()"></div>
        <div class="relative max-w-md mx-auto mt-32 glass-card rounded-2xl p-6">
            <div class="flex items-center justify-between">
                <h3 class="text-lg font-bold text-slate-900 dark:text-white">QQ</h3>
                <button type="button" class="text-slate-500 hover:text-slate-700 dark:hover:text-slate-200" onclick="closeQQModal()" aria-label="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <p class="mt-4 text-slate-600 dark:text-slate-300">QQ：</p>
            <div class="mt-3 rounded-lg border border-slate-200/70 dark:border-slate-600/50 bg-white/50 dark:bg-slate-900/30 px-4 py-3 font-mono text-sm text-slate-900 dark:text-white">
                <span id="qq-text">加载中...</span>
            </div>
        </div>
    </div>

    <script src="/assets/script.js"></script>
    <script>
        function openEmailModal() {
            document.getElementById('email-modal')?.classList.remove('hidden');
        }

        function closeEmailModal() {
            document.getElementById('email-modal')?.classList.add('hidden');
        }

        function openQQModal() {
            document.getElementById('qq-modal')?.classList.remove('hidden');
        }

        function closeQQModal() {
            document.getElementById('qq-modal')?.classList.add('hidden');
        }

        // 加载最新文章
        async function loadLatestArticles() {
            try {
                const response = await fetch('/api/articles');
                if (!response.ok) throw new Error('articles');
                const articles = await response.json();

                // 只显示最新的3篇文章
                const latestArticles = articles.slice(0, 3);
                const container = document.getElementById('articles-container');
                container.innerHTML = '';

                latestArticles.forEach((article, index) => {
                    const card = document.createElement('div');
                    card.className = 'article-card glass-card p-6 rounded-2xl cursor-pointer';
                    card.innerHTML = `
                        <div class="flex items-start justify-between gap-4">
                            <h3 class="text-lg font-bold text-slate-900 dark:text-white leading-snug">${article.title}</h3>
                            <span class="shrink-0 text-xs font-semibold text-indigo-700 dark:text-indigo-300 bg-indigo-50/80 dark:bg-indigo-500/10 border border-indigo-200/60 dark:border-indigo-300/20 px-2.5 py-1 rounded-full">
                                ${article.date}
                            </span>
                        </div>
                        <p class="mt-3 text-slate-600 dark:text-slate-300 line-clamp-3">${article.summary}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-slate-500 dark:text-slate-400">${article.author ?? ''}</span>
                            <a href="detail.html?id=${article.id}" class="text-indigo-600 hover:text-indigo-700 font-semibold">
                                阅读更多 <i class="fas fa-arrow-right ml-1"></i>
                            </a>
                        </div>
                    `;
                    card.addEventListener('click', (e) => {
                        if (e.target.closest('a')) return;
                        const url = `detail.html?id=${article.id}`;
                        if (e.ctrlKey || e.metaKey) window.open(url, '_blank');
                        else window.location.href = url;
                    });
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('获取文章列表失败:', error);
                document.getElementById('articles-error').classList.remove('hidden');
            }
        }

        // 切换深色模式
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');

            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.className = 'fas fa-moon';
                localStorage.setItem('darkMode', 'false');
            } else {
                html.classList.add('dark');
                icon.className = 'fas fa-sun';
                localStorage.setItem('darkMode', 'true');
            }
        }

        // 切换移动端菜单
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        // 页面加载时执行（技能标签由 Contact.init → refreshAuthorFromApi 从数据库 /api/author 填充）
        document.addEventListener('DOMContentLoaded', async () => {
            // 检查深色模式设置
            const darkMode = localStorage.getItem('darkMode');
            if (darkMode === 'true') {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').className = 'fas fa-sun';
            }

            await Contact.init();
            loadLatestArticles();
        });
    </script>
</body>
</html>
