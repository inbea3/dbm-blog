<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写博客 - 我的个人博客</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/style.css">
    <style>
        .editor-area { min-height: 50vh; }
        .preview { min-height: 50vh; }
        .article-content img { max-width: 100%; height: auto; border-radius: 0.75rem; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <button class="dark-mode-toggle" onclick="toggleDarkMode()">
        <i class="fas fa-moon" id="theme-icon"></i>
    </button>

    <nav class="navbar fixed top-0 w-full z-50">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="text-2xl font-bold text-indigo-600">
                    <a href="index.html" class="brand-mark hover:opacity-90 transition-opacity">
                        <span class="brand-mark-text">My Blog</span>
                    </a>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="nav-link text-gray-700 hover:text-indigo-600 transition-colors">首页</a>
                    <a href="blog.html" class="nav-link text-gray-700 hover:text-indigo-600 transition-colors">博客</a>
                    <a href="about.html" class="nav-link text-gray-700 hover:text-indigo-600 transition-colors">关于我</a>
                </div>
                <div class="hidden md:flex items-center gap-4 text-gray-600 dark:text-gray-200">
                    <a id="contact-gitee" href="#" target="_blank" class="hover:text-indigo-600 transition-colors" aria-label="Gitee">
                        <i class="fas fa-code-branch text-lg"></i>
                    </a>
                    <button type="button" onclick="openEmailModal()" class="hover:text-indigo-600 transition-colors" aria-label="Email">
                        <i class="fas fa-envelope text-lg"></i>
                    </button>
                    <button type="button" onclick="openQQModal()" class="hover:text-indigo-600 transition-colors" aria-label="QQ">
                        <i class="fab fa-qq text-lg"></i>
                    </button>
                    <a href="about.html" class="ml-1 guest-only" data-auth-trigger="1" aria-label="登录">
                        <span class="guest-avatar-btn"><i class="fas fa-user"></i></span>
                    </a>
                    <a href="about.html" class="ml-1 admin-only hidden" aria-label="Avatar">
                        <img class="author-avatar-thumb hidden" alt="头像缩略图" />
                    </a>
                </div>
                <button class="md:hidden" onclick="toggleMobileMenu()">
                    <i class="fas fa-bars text-2xl"></i>
                </button>
            </div>
            <div id="mobile-menu" class="hidden md:hidden mt-4 space-y-2">
                <a href="index.html" class="block py-2 text-gray-700 hover:text-indigo-600">首页</a>
                <a href="blog.html" class="block py-2 text-gray-700 hover:text-indigo-600">博客</a>
                <a href="about.html" class="block py-2 text-gray-700 hover:text-indigo-600">关于我</a>
            </div>
        </div>
    </nav>

    <main class="pt-24 px-6 pb-16">
        <div class="max-w-6xl mx-auto">
            <div class="flex items-start justify-between gap-6">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900 dark:text-white">写博客</h1>
                    <p class="mt-2 text-gray-600 dark:text-gray-300">支持 Markdown / 纯文本，支持插入图片并在线保存。</p>
                </div>
                <div class="flex items-center gap-3">
                    <a href="blog.html" class="px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                        返回列表
                    </a>
                    <button id="save-btn" type="button" onclick="saveArticle()" class="admin-only hidden px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 transition-colors font-semibold">
                        保存
                    </button>
                </div>
            </div>

            <div class="mt-6 grid gap-4 md:grid-cols-3">
                <div class="md:col-span-2">
                    <label class="text-sm font-semibold text-gray-700 dark:text-gray-200">标题</label>
                    <input id="title" class="mt-2 w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 px-4 py-3 text-gray-900 dark:text-white" placeholder="请输入标题" />
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-700 dark:text-gray-200">风格</label>
                    <select id="style" class="mt-2 w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 px-4 py-3 text-gray-900 dark:text-white">
                        <option value="default">默认</option>
                        <option value="clean">清爽</option>
                        <option value="tech">技术</option>
                        <option value="note">笔记</option>
                    </select>
                </div>
            </div>

            <div class="mt-4 grid gap-4 md:grid-cols-3">
                <div>
                    <label class="text-sm font-semibold text-gray-700 dark:text-gray-200">日期</label>
                    <input id="date" type="date" class="mt-2 w-full rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 px-4 py-3 text-gray-900 dark:text-white" />
                </div>
            </div>

            <div class="mt-4 flex flex-wrap items-center gap-3">
                <div class="inline-flex items-center gap-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 px-3 py-2">
                    <span class="text-sm font-semibold text-gray-700 dark:text-gray-200">格式</span>
                    <select id="format" class="bg-transparent text-sm text-gray-900 dark:text-white" onchange="onFormatChange()">
                        <option value="md">Markdown</option>
                        <option value="txt">TXT</option>
                    </select>
                </div>

                <input id="image-file" type="file" accept="image/*" class="hidden" onchange="onInsertImage()" />
                <button type="button" onclick="document.getElementById('image-file').click()" class="admin-only hidden inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                    <i class="fas fa-image"></i> 插入图片
                </button>

                <button type="button" onclick="togglePreview()" class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                    <i class="fas fa-eye"></i> 切换预览
                </button>

                <span id="status" class="text-sm text-gray-600 dark:text-gray-300"></span>
            </div>

            <div class="mt-4 grid gap-4 lg:grid-cols-2">
                <div id="editor-col" class="rounded-2xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-4">
                    <div class="flex items-center justify-between">
                        <h2 class="text-sm font-bold text-gray-700 dark:text-gray-200">正文编辑</h2>
                        <span id="article-id-badge" class="text-xs text-gray-500"></span>
                    </div>
                    <textarea id="content" class="editor-area mt-3 w-full resize-y rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 px-4 py-3 text-gray-900 dark:text-white font-mono text-sm" placeholder="开始写作..." oninput="schedulePreview()"></textarea>
                </div>

                <div id="preview-col" class="rounded-2xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-4">
                    <div class="flex items-center justify-between">
                        <h2 class="text-sm font-bold text-gray-700 dark:text-gray-200">预览</h2>
                        <span class="text-xs text-gray-500">由后端渲染（与详情页一致）</span>
                    </div>
                    <div id="preview" class="preview mt-3 article-content text-gray-900 dark:text-white"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- 联系方式弹窗（复用已有 DOM id） -->
    <div id="email-modal" class="hidden fixed inset-0 z-[1100]">
        <div class="absolute inset-0 bg-black/50" onclick="closeEmailModal()"></div>
        <div class="relative max-w-md mx-auto mt-32 bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-xl">
            <div class="flex items-center justify-between">
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">邮箱</h3>
                <button type="button" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-200" onclick="closeEmailModal()" aria-label="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <p class="mt-4 text-gray-600 dark:text-gray-300">email：</p>
            <div class="mt-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 px-4 py-3 font-mono text-sm text-gray-900 dark:text-white">
                <span id="email-text">加载中...</span>
            </div>
        </div>
    </div>

    <div id="qq-modal" class="hidden fixed inset-0 z-[1100]">
        <div class="absolute inset-0 bg-black/50" onclick="closeQQModal()"></div>
        <div class="relative max-w-md mx-auto mt-28 bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-xl">
            <div class="flex items-center justify-between">
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">QQ</h3>
                <button type="button" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-200" onclick="closeQQModal()" aria-label="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <p class="mt-4 text-gray-600 dark:text-gray-300"></p>
            <div class="mt-4 flex justify-center">
                <img id="qq-qr" src="" alt="QQ QR" class="w-56 h-56 rounded-xl border border-gray-200 dark:border-gray-700 bg-white" />
            </div>
            <p class="mt-3 text-center text-sm text-gray-500">QQ：<span id="qq-text">加载中...</span></p>
        </div>
    </div>

    <script src="/assets/script.js"></script>
    <script>
        let currentId = null;
        let previewVisible = true;
        let previewTimer = null;

        function openEmailModal() { document.getElementById('email-modal')?.classList.remove('hidden'); }
        function closeEmailModal() { document.getElementById('email-modal')?.classList.add('hidden'); }
        function openQQModal() { document.getElementById('qq-modal')?.classList.remove('hidden'); }
        function closeQQModal() { document.getElementById('qq-modal')?.classList.add('hidden'); }

        function toggleDarkMode() { DarkMode.toggle(); }
        function toggleMobileMenu() { MobileMenu.toggle(); }

        function getIdFromUrl() {
            const p = new URLSearchParams(window.location.search);
            const id = p.get('id');
            return id ? parseInt(id) : null;
        }

        function schedulePreview() {
            if (!previewVisible) return;
            if (previewTimer) clearTimeout(previewTimer);
            previewTimer = setTimeout(renderPreview, 250);
        }

        async function renderPreview() {
            if (!previewVisible) return;
            const fmt = document.getElementById('format').value;
            const content = document.getElementById('content').value;
            const preview = document.getElementById('preview');
            if (!preview) return;

            try {
                // 用后端渲染保持一致性：创建临时 HTML（不落盘）
                // 简化：直接调用 create/update 的返回 HTML 前先不做；这里做最小预览（md 用 <pre> 兜底）
                if (fmt === 'txt') {
                    preview.innerHTML = `<pre>${content.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}</pre>`;
                } else {
                    // 轻量预览：让 markdown 原样显示；最终以详情页为准
                    preview.innerHTML = content
                        .replaceAll('&','&amp;')
                        .replaceAll('<','&lt;')
                        .replaceAll('>','&gt;')
                        .replaceAll('\n', '<br/>');
                }
            } catch (e) {
                preview.textContent = '预览失败';
            }
        }

        function togglePreview() {
            previewVisible = !previewVisible;
            document.getElementById('preview-col')?.classList.toggle('hidden', !previewVisible);
            if (previewVisible) renderPreview();
        }

        function onFormatChange() {
            schedulePreview();
        }

        function insertAtCursor(textarea, text) {
            const start = textarea.selectionStart ?? textarea.value.length;
            const end = textarea.selectionEnd ?? textarea.value.length;
            const before = textarea.value.slice(0, start);
            const after = textarea.value.slice(end);
            textarea.value = before + text + after;
            const pos = start + text.length;
            textarea.setSelectionRange(pos, pos);
            textarea.focus();
            schedulePreview();
        }

        async function onInsertImage() {
            if (!Auth?.requireAdminOrExplain?.()) return;
            const input = document.getElementById('image-file');
            const file = input?.files?.[0];
            if (!file) return;
            const status = document.getElementById('status');
            if (status) status.textContent = '图片上传中...';
            try {
                const res = await API.uploadArticleImage(file);
                const url = res?.url;
                const fmt = document.getElementById('format').value;
                const ta = document.getElementById('content');
                if (fmt === 'md') {
                    insertAtCursor(ta, `\n\n![](${url})\n\n`);
                } else {
                    insertAtCursor(ta, `\n\n[图片] ${url}\n\n`);
                }
                if (status) status.textContent = '图片已插入';
            } catch (e) {
                if (status) status.textContent = `图片上传失败：${e?.message ?? e}`;
            } finally {
                if (input) input.value = '';
                setTimeout(() => { const s=document.getElementById('status'); if(s) s.textContent=''; }, 2000);
            }
        }

        async function loadForEdit(id) {
            const status = document.getElementById('status');
            if (status) status.textContent = '加载文章...';
            const a = await API.getArticle(id);
            currentId = a.id;
            document.getElementById('article-id-badge').textContent = `ID: ${a.id}`;
            document.getElementById('title').value = a.title ?? '';
            document.getElementById('style').value = a.style ?? 'default';
            document.getElementById('format').value = a.format ?? 'md';
            document.getElementById('date').value = a.date ?? '';
            document.getElementById('content').value = a.raw ?? '';
            schedulePreview();
            if (status) status.textContent = '';
        }

        async function saveArticle() {
            if (!Auth?.requireAdminOrExplain?.()) return;
            const btn = document.getElementById('save-btn');
            const status = document.getElementById('status');
            if (btn) btn.disabled = true;
            if (status) status.textContent = '保存中...';
            try {
                const payload = {
                    title: document.getElementById('title').value,
                    style: document.getElementById('style').value,
                    format: document.getElementById('format').value,
                    date: document.getElementById('date').value,
                    content: document.getElementById('content').value
                };
                let saved;
                if (currentId) {
                    saved = await API.updateArticle(currentId, payload);
                } else {
                    saved = await API.createArticle(payload);
                    currentId = saved.id;
                    document.getElementById('article-id-badge').textContent = `ID: ${saved.id}`;
                    history.replaceState({}, '', `editor.html?id=${saved.id}`);
                }
                if (status) status.textContent = '已保存';
                // 更新预览为后端渲染后的 HTML（更准确）
                const preview = document.getElementById('preview');
                if (preview && saved?.content) preview.innerHTML = saved.content;
                setTimeout(() => { const s=document.getElementById('status'); if(s) s.textContent=''; }, 1500);
            } catch (e) {
                if (status) status.textContent = `保存失败：${e?.message ?? e}`;
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            Contact.init();
            // 默认日期：今天（新建文章时）
            const d = document.getElementById('date');
            if (d && !d.value) d.value = new Date().toISOString().slice(0, 10);
            const id = getIdFromUrl();
            if (id) {
                try { await loadForEdit(id); } catch (e) { const s=document.getElementById('status'); if(s) s.textContent='加载失败'; }
            } else {
                schedulePreview();
            }
        });
    </script>
</body>
</html>
