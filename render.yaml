services:
  - type: web
    name: dbm-blog-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PGHOST
        sync: false
      - key: PGDATABASE
        sync: false
      - key: PGUSER
        sync: false
      - key: PGPASSWORD
        sync: false
      - key: PGSSLMODE
        value: require
      - key: PGCHANNELBINDING
        value: require
      - key: BLOG_SECRET_KEY
        generateValue: true
      - key: BLOG_ALLOWED_ORIGINS
        value: https://inbea3.github.io
